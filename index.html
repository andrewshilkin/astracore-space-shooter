<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraCore — Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0d1a;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: monospace;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #menu-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.65);
      color: #00ccff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.8;
      pointer-events: none;
      border: 1px solid rgba(0, 204, 255, 0.3);
      display: none;
    }
    #hud .pause-btn {
      pointer-events: auto;
      min-width: 44px;
      min-height: 44px;
      background: rgba(0, 204, 255, 0.15);
      color: #00ccff;
      border: 1px solid rgba(0, 204, 255, 0.4);
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
      margin-top: 6px;
      display: none;
    }
    .touch-device #hud .pause-btn {
      display: block;
    }
    #pause-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 20;
    }
    /* Small viewports (phones) */
    @media (max-width: 480px) {
      #hud { font-size: 11px; padding: 4px 8px; }
      #hud .pause-btn { min-width: 48px !important; min-height: 48px !important; font-size: 14px !important; }
    }
    /* Medium viewports (tablets) */
    @media (min-width: 481px) and (max-width: 1024px) {
      #hud { font-size: 13px; }
      #hud .pause-btn { min-width: 44px; min-height: 44px; font-size: 13px; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DQLphnse.js"></script>
</head>
<body>
  <canvas id="app-canvas"></canvas>
  <div id="menu-overlay"></div>
  <div id="hud"></div>
  <div id="pause-overlay"></div>
</body>
</html>
